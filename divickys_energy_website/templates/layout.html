<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a href="{{ url_for('home') }}" class="brand">
                <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="{{ company.name }} logo" class="logo">
            </a>
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('about') }}">About</a>
                <a href="{{ url_for('services') }}">Services</a>
                <a href="{{ url_for('contact') }}">Contact</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-brand">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="{{ company.name }} logo" class="footer-logo">
            <p>{{ company.tagline }}</p>
        </div>
        <div>
            <p>{{ company.address }}</p>
            <p>{{ company.phones|join(" | ") }}</p>
            <p>{{ company.email }}</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
